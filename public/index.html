<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Dutch-Farsi Mentor AI</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body { font-family: system-ui; margin: 0; background: #f3f4f6; }
        header { background: #111827; color: white; padding: 16px; display: flex; justify-content: space-between; }
        .container { max-width: 900px; margin: auto; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 12px; margin-bottom: 20px; }
        .flashcard { font-size: 2rem; text-align: center; padding: 30px; background: #fafafa; border-radius: 10px; cursor: pointer; }
        button { background: #2563eb; color: white; border: none; padding: 10px 16px; border-radius: 8px; cursor: pointer; }
        .hidden { display: none; }
        .progress { height: 8px; background: #ddd; border-radius: 10px; overflow: hidden; margin-top: 10px; }
        .progress-bar { height: 100%; background: #10b981; width: 0%; }
        input, textarea { width: 100%; padding: 10px; margin-top: 10px; border-radius: 8px; border: 1px solid #ddd; }
    </style>
</head>
<body>

<header>
    <h2>Dutch-Farsi Mentor</h2>
    <div>
        <button onclick="showTab('dashboard')">Dashboard</button>
        <button onclick="startLesson()">Start Lesson</button>
        <button onclick="showTab('ai')">AI Teacher</button>
    </div>
</header>

<div class="container">
    <div id="dashboard" class="card">
        <h3>Progress</h3>
        <p>XP: <span id="xp">0</span> | Exercises: <span id="exercises">0</span></p>
        <div class="progress"><div class="progress-bar" id="progress-bar"></div></div>
    </div>

    <div id="lesson" class="hidden">
        <div class="card">
            <h3 id="exercise-type">Lesson</h3>
            <div id="exercise-area"></div>

            <div id="practice" style="margin-top: 20px; border-top: 1px solid #eee; padding-top: 20px;">
                <h4>Grammar Practice (جمله سازی)</h4>
                <p>Try writing a Dutch sentence:</p>
                <textarea id="user-sentence" placeholder="Write in Dutch..."></textarea>
                <button onclick="checkSentence()" style="margin-top: 10px; background: #333;">Check Grammar</button>
                <div id="feedback-output" style="margin-top: 15px; font-style: italic;"></div>
            </div>
        </div>
    </div>

    <div id="ai" class="hidden card">
        <h3>AI Teacher</h3>
        <input id="ai-input" placeholder="Ask a question about Dutch grammar...">
        <button onclick="askAI()">Ask</button>
        <p id="ai-output" style="margin-top: 15px;"></p>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
    import { getFirestore } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

    // Initialize your Firebase
    const firebaseConfig = { /* Your config here */ };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // Global Memory State
    window.chatHistory = [];

    // AI Teacher Function (Maintains Memory)
    window.askAI = async function() {
        const input = document.getElementById("ai-input");
        const output = document.getElementById("ai-output");
        chatHistory.push({ role: "user", parts: [{ text: input.value }] });

        const res = await fetch('/askAI', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ history: chatHistory })
        });
        const data = await res.json();
        chatHistory.push({ role: "model", parts: [{ text: data.answer }] });
        output.innerText = data.answer;
        input.value = "";
    }

    // Pronunciation Function
    window.speakDutch = function(text) {
        const u = new SpeechSynthesisUtterance(text);
        u.lang = 'nl-NL';
        u.rate = 0.9;
        window.speechSynthesis.speak(u);
    }

    // Grammar Check Function
    window.checkSentence = async function() {
        const sentence = document.getElementById("user-sentence").value;
        const out = document.getElementById("feedback-output");
        out.innerText = "Analyzing...";

        // You can reuse askAI logic here or a specific endpoint
        const res = await fetch('/askAI', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ history: [{role: "user", parts: [{text: "Critique this Dutch sentence: " + sentence}]}] })
        });
        const data = await res.json();
        out.innerText = data.answer;
    }

    // ... [Add your other functions like showTab, startLesson, etc. here] ...
</script>
</body>
</html>
